<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealHive Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f3ee; margin: 0; color: #5d4634; }
    .card { max-width: 460px; margin: 60px auto; background: #fff; padding: 24px; border-radius: 12px; border: 1px solid #eadfce; box-shadow: 0 10px 25px rgba(63, 41, 24, .08); }
    h1 { margin: 0 0 8px; }
    p { color: #7a6655; }
    input { width: 100%; padding: 10px; border: 1px solid #d9c8b5; border-radius: 8px; margin-top: 8px; }
    button { width: 100%; margin-top: 18px; padding: 12px; border: none; border-radius: 8px; background: #7b5d45; color: #fff; font-weight: 700; }
    a { color: #7b5d45; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome back to HealHive</h1>
    <p>Login to continue your mental wellness journey.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>
    <p>New here? <a href="/auth/signup/">Create account</a></p>
  </div>
</body>
</html>
